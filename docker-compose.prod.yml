# Production Docker Compose — full stack: postgres, redis, minio, api, worker, nginx
#
# Usage:
#   cp .env.prod.example .env.prod && vim .env.prod   # fill in secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Env vars are read from .env.prod via --env-file flag (not auto-loaded from .env).
# Internal services (postgres/redis/minio) have NO host ports exposed in prod —
# all traffic flows through nginx on :80/:443.

services:
  postgres:
    image: postgres:16-alpine
    container_name: his-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hospital_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital -d hospital_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: his-prod-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: his-prod-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./hospital-server
      dockerfile: deploy/Dockerfile
    image: his-api:latest
    container_name: his-prod-api
    restart: unless-stopped
    command: ["/app/server"]
    environment:
      DATABASE_URL: postgres://hospital:${POSTGRES_PASSWORD}@postgres:5432/hospital_db?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: minio://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000/${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_MODE: release
      JWT_EXPIRE_HOUR: ${JWT_EXPIRE_HOUR:-24}
      WECHAT_ENABLED: ${WECHAT_ENABLED:-false}
      WECHAT_CORP_ID: ${WECHAT_CORP_ID:-}
      WECHAT_AGENT_ID: ${WECHAT_AGENT_ID:-0}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WECHAT_CALLBACK: ${WECHAT_CALLBACK:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./hospital-server
      dockerfile: deploy/Dockerfile
    image: his-api:latest
    container_name: his-prod-worker
    restart: unless-stopped
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://hospital:${POSTGRES_PASSWORD}@postgres:5432/hospital_db?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: minio://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000/${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_MODE: release
      WECHAT_ENABLED: ${WECHAT_ENABLED:-false}
      WECHAT_CORP_ID: ${WECHAT_CORP_ID:-}
      WECHAT_AGENT_ID: ${WECHAT_AGENT_ID:-0}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WECHAT_CALLBACK: ${WECHAT_CALLBACK:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    build:
      context: ./hospital-web
    container_name: his-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    # Uncomment to enable HTTPS after generating/mounting certs:
    # volumes:
    #   - ./certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
