basePath: /
definitions:
  dto.AssignTicketReq:
    properties:
      assignee_id:
        type: string
    required:
    - assignee_id
    type: object
  dto.CreateCommentReq:
    properties:
      content:
        type: string
      is_internal:
        type: boolean
    required:
    - content
    type: object
  dto.CreateHospitalReq:
    properties:
      address:
        type: string
      bed_count:
        type: integer
      category_id:
        type: string
      city:
        type: string
      code:
        maxLength: 50
        type: string
      contact_email:
        type: string
      contact_name:
        type: string
      contact_phone:
        type: string
      department_count:
        type: integer
      fields:
        additionalProperties:
          type: string
        description: dynamic field key->value
        type: object
      is_specialized:
        type: boolean
      level:
        type: string
      name:
        maxLength: 200
        type: string
      owner_user_id:
        type: string
      province_id:
        type: string
      remark:
        type: string
      specialty_type:
        type: string
    required:
    - code
    - name
    type: object
  dto.CreateTicketReq:
    properties:
      assignee_id:
        type: string
      description:
        type: string
      hospital_id:
        type: string
      priority:
        type: integer
      title:
        maxLength: 200
        type: string
      type_id:
        type: string
    required:
    - title
    - type_id
    type: object
  dto.CreateUserReq:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      phone:
        maxLength: 20
        type: string
      province_id:
        type: string
      real_name:
        maxLength: 100
        type: string
      region_id:
        type: string
      role_ids:
        items:
          type: string
        type: array
      username:
        maxLength: 100
        type: string
    required:
    - password
    - real_name
    - username
    type: object
  dto.LoginReq:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResp:
    properties:
      expires_in:
        type: integer
      token:
        type: string
      user: {}
    type: object
  dto.PageResult:
    properties:
      list: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  dto.SetUserRolesReq:
    properties:
      role_ids:
        items:
          type: string
        type: array
    required:
    - role_ids
    type: object
  dto.TransitionTicketReq:
    properties:
      to_status_id:
        type: string
    required:
    - to_status_id
    type: object
  dto.UpdateHospitalReq:
    properties:
      address:
        type: string
      bed_count:
        type: integer
      category_id:
        type: string
      city:
        type: string
      contact_email:
        type: string
      contact_name:
        type: string
      contact_phone:
        type: string
      department_count:
        type: integer
      fields:
        additionalProperties:
          type: string
        type: object
      is_specialized:
        type: boolean
      level:
        type: string
      name:
        type: string
      owner_user_id:
        type: string
      province_id:
        type: string
      remark:
        type: string
      specialty_type:
        type: string
      status:
        type: integer
    type: object
  dto.UpdateUserReq:
    properties:
      avatar_url:
        type: string
      email:
        maxLength: 255
        type: string
      phone:
        maxLength: 20
        type: string
      province_id:
        type: string
      real_name:
        maxLength: 100
        type: string
      region_id:
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
    type: object
  portal.UpdateProfileReq:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      phone:
        type: string
      real_name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 医院信息系统 API
  title: HIS API
  version: "1.0"
paths:
  /api/admin/v1/auth/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResp'
              type: object
      security:
      - BearerAuth: []
