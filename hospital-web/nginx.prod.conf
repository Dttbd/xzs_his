server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Swagger UI proxy
    location /swagger/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
    }

    # Portal SPA — served under /portal/ (vite base: '/portal/')
    location /portal/ {
        alias /usr/share/nginx/html/portal/;
        try_files $uri $uri/ /portal/index.html;
    }

    # Static asset caching for portal (capture group required when using alias in regex location)
    location ~* ^/portal/(.+\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
        alias /usr/share/nginx/html/portal/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin SPA — root (vite base: '/')
    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html/admin;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

